<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FinFlow</title>
    
    <!-- Scripts base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (CDN para usarlos sin imports) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
      // 1. Mapeamos los iconos para que App.jsx los encuentre globalmente
      // Si tu App.jsx usa <ShoppingCart />, esto evita que explote.
      window.ShoppingCart = () => <i data-lucide="shopping-cart"></i>;
      window.Zap = () => <i data-lucide="zap"></i>;
      window.PiggyBank = () => <i data-lucide="piggy-bank"></i>;
      window.ArrowUpRight = () => <i data-lucide="arrow-up-right"></i>;
      window.Trash2 = () => <i data-lucide="trash-2"></i>;
      window.Plus = () => <i data-lucide="plus"></i>;
      window.X = () => <i data-lucide="x"></i>;

      // 2. Ejecutamos Lucide después de que React renderice (opcional pero recomendado)
      window.refreshIcons = () => lucide.createIcons();
    </script>
    
    <!-- 3. Cargamos tu App -->
    <script type="text/babel" data-presets="react" src="./App.jsx"></script>
</body>
</html>
